server:
  port: 8083

spring:
  application:
    name: team2-backend-activity

  jackson:
    property-naming-strategy: SNAKE_CASE

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/team2_activity}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.team2.activity.entity
  type-handlers-package: com.team2.activity.query.mapper.typehandler
  configuration:
    map-underscore-to-camel-case: true

documents:
  service:
    url: ${DOCUMENTS_SERVICE_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health, info
