server:
  port: 8013

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  application:
    name: team2-backend-activity

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/team2_activity}
    username: ${DB_USERNAME:team2}
    password: ${DB_PASSWORD:team2}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://backend-auth:8011/.well-known/jwks.json}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.team2.activity.command.domain.entity
  type-handlers-package: com.team2.activity.query.mapper.typehandler
  configuration:
    map-underscore-to-camel-case: true

documents:
  service:
    url: ${DOCUMENTS_SERVICE_URL:http://localhost:8084}

# 인증 서비스 URL (사용자 이름 조회에 사용한다)
auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8011}

# 거래처 마스터 서비스 URL (거래처명 조회에 사용한다)
master:
  service:
    url: ${MASTER_SERVICE_URL:http://localhost:8012}

report:
  pdf:
    font-path: ${REPORT_PDF_FONT_PATH:}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health, info
